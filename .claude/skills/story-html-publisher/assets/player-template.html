<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>__STORY_TITLE__</title>
<!--
  AI Storybook — self-contained player.
  All images and audio are embedded as base64 data URIs in the #story-data
  block below, so this single file works offline and can be shared as-is.
  Generated by the story-html-publisher skill.
-->
<style>
  :root {
    --bg:        #fbf7ee;
    --bg-2:      #f4ead3;
    --ink:       #3a3326;
    --ink-soft:  #6b5f49;
    --accent:    #d98a3d;
    --accent-2:  #b9692a;
    --card:      #ffffff;
    --shadow:    0 10px 30px rgba(120, 88, 38, 0.14);
    --radius:    22px;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    color: var(--ink);
    background:
      radial-gradient(ellipse at top, rgba(217,138,61,0.10) 0%, transparent 55%),
      radial-gradient(ellipse at bottom right, rgba(185,105,42,0.08) 0%, transparent 60%),
      var(--bg);
    overflow: hidden;
  }
  .display { font-family: Georgia, "Iowan Old Style", "Palatino Linotype", serif; }

  .shell {
    height: 100vh; height: 100dvh;
    display: flex; flex-direction: column;
    max-width: 1100px; margin: 0 auto;
  }

  /* ---------- Header ---------- */
  header {
    position: relative; z-index: 3;
    flex: 0 0 auto;
    display: flex; align-items: center; justify-content: center;
    padding: 14px 18px;
    border-bottom: 1px solid rgba(180,140,70,0.18);
    background: var(--bg);
    backdrop-filter: blur(6px);
  }
  header h1 {
    margin: 0; font-size: clamp(16px, 2.4vw, 22px); font-weight: 700;
    color: var(--ink); text-align: center;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 80%;
  }
  .settings {
    position: absolute; right: 14px;
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 13px; color: var(--ink-soft); cursor: pointer;
    padding: 6px 10px; border-radius: 999px; user-select: none;
  }
  .settings:hover { background: rgba(217,138,61,0.12); }
  .settings input { accent-color: var(--accent); }

  /* ---------- Stage (image + text) ---------- */
  .stage {
    position: relative; z-index: 1;
    flex: 1 1 auto; min-height: 0;
    display: grid; grid-template-rows: minmax(0,1fr) auto;
    gap: 6px; padding: 12px 16px 4px;
  }
  @media (min-width: 820px) {
    .stage { grid-template-rows: 1fr; grid-template-columns: 1.1fr 0.9fr; align-items: stretch; gap: 28px; padding: 20px 28px; }
  }

  .image-wrap {
    position: relative; min-height: 0; min-width: 0;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; user-select: none;
  }
  .image-wrap img {
    max-width: 100%; max-height: 100%; object-fit: contain;
    border-radius: var(--radius); box-shadow: var(--shadow);
    transition: opacity .35s ease;
    background: var(--card);
  }
  .image-wrap.fading img { opacity: 0; }

  /* Cover scene = clean full illustration: no overlay text, no scrim.
     The story title still shows in the header. */
  .stage.cover { grid-template-columns: 1fr; grid-template-rows: 1fr; }
  .stage.cover .text-wrap { display: none; }

  .text-wrap {
    display: flex; align-items: center; justify-content: center;
    overflow-y: auto; padding: 4px 6px;
  }
  .text-wrap p {
    margin: 0; text-align: center; line-height: 1.7;
    color: var(--ink);
    font-family: Georgia, "Iowan Old Style", "Palatino Linotype", serif;
    font-size: clamp(17px, 2.2vw, 26px);
    transition: opacity .35s ease;
    max-width: 32ch;
  }
  .stage.fading .text-wrap p { opacity: 0; }

  /* ---------- Footer (controls) ---------- */
  footer {
    flex: 0 0 auto;
    padding: 8px 18px max(12px, env(safe-area-inset-bottom));
    border-top: 1px solid rgba(180,140,70,0.18);
    background: rgba(251,247,238,0.92);
    backdrop-filter: blur(6px);
  }
  .dots { display: flex; justify-content: center; gap: 7px; margin: 4px 0 10px; flex-wrap: wrap; }
  .dot {
    width: 9px; height: 9px; border-radius: 50%; border: none; padding: 0; cursor: pointer;
    background: rgba(180,140,70,.3); transition: all .2s ease;
  }
  .dot.done { background: var(--accent); }
  .dot.active { width: 13px; height: 13px; background: var(--accent-2); box-shadow: 0 0 0 3px rgba(217,138,61,.25); }

  .controls { display: flex; align-items: center; justify-content: center; gap: 18px; }
  .nav-btn {
    width: 46px; height: 46px; border-radius: 50%; cursor: pointer;
    border: 1px solid rgba(180,140,70,.35); background: #fff; color: var(--ink);
    display: flex; align-items: center; justify-content: center; transition: all .15s ease;
  }
  .nav-btn:hover:not(:disabled) { background: var(--bg-2); }
  .nav-btn:disabled { opacity: .3; cursor: not-allowed; }
  .play-btn {
    width: 62px; height: 62px; border-radius: 50%; cursor: pointer; border: none;
    background: var(--accent); color: #fff;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 8px 22px rgba(180,110,40,.4); transition: transform .12s ease, background .15s ease;
  }
  .play-btn:hover { background: var(--accent-2); transform: scale(1.05); }
  .play-btn:active { transform: scale(1); }

  /* ---------- End screen ---------- */
  .end {
    flex: 1 1 auto; display: none; flex-direction: column;
    align-items: center; justify-content: center; text-align: center; padding: 24px; gap: 14px;
  }
  .end.show { display: flex; }
  .end .star { font-size: 64px; }
  .end h2 { margin: 0; font-size: clamp(28px,5vw,44px); font-weight: 800; color: var(--ink); }
  .end p { margin: 0; color: var(--ink-soft); font-size: 18px; }
  .end .btn {
    margin-top: 8px; display: inline-flex; align-items: center; gap: 8px;
    padding: 12px 26px; border-radius: 999px; border: none; cursor: pointer;
    background: var(--accent); color: #fff; font-size: 17px; font-weight: 700;
    box-shadow: 0 8px 22px rgba(180,110,40,.35);
  }
  .end .btn:hover { background: var(--accent-2); }

  .hidden { display: none !important; }
  svg { display: block; }
</style>
</head>
<body>
<script id="story-data" type="application/json">__STORY_DATA__</script>

<div class="shell">
  <header>
    <h1 class="display" id="story-title"></h1>
    <label class="settings" title="Auto-play the next scene when narration ends">
      <input type="checkbox" id="autoadvance" checked>
      Auto-play
    </label>
  </header>

  <!-- Scene view -->
  <main class="stage" id="stage">
    <div class="image-wrap" id="image-wrap">
      <img id="scene-img" alt="">
    </div>
    <div class="text-wrap">
      <p id="scene-text"></p>
    </div>
  </main>

  <!-- End screen -->
  <section class="end" id="end">
    <div class="star">🌟</div>
    <h2 class="display">The End</h2>
    <p>Thanks for reading!</p>
    <button class="btn" id="replay-btn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4v5h5M20 20v-5h-5M4 9a8 8 0 0114-3M20 15a8 8 0 01-14 3"/></svg>
      Read again
    </button>
  </section>

  <footer id="footer">
    <div class="dots" id="dots"></div>
    <div class="controls">
      <button class="nav-btn" id="prev-btn" aria-label="Previous">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 5l-7 7 7 7"/></svg>
      </button>
      <button class="play-btn" id="play-btn" aria-label="Play">
        <svg id="icon-play" width="26" height="26" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        <svg id="icon-pause" class="hidden" width="26" height="26" viewBox="0 0 24 24" fill="currentColor"><path d="M6 5h4v14H6zm8 0h4v14h-4z"/></svg>
      </button>
      <button class="nav-btn" id="next-btn" aria-label="Next">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 5l7 7-7 7"/></svg>
      </button>
    </div>
  </footer>
</div>

<audio id="audio" preload="auto"></audio>

<script>
(function () {
  "use strict";
  var DATA = JSON.parse(document.getElementById("story-data").textContent);
  var scenes = DATA.scenes || [];
  // Slide 0 is a dedicated title page: the first illustration shown clean (no
  // body text), playing only the spoken title; the story scenes follow it.
  var slides = [{
    cover: true,
    image: (scenes[0] && scenes[0].image) || "",
    text: "",
    scene: DATA.title || "",
    audio: DATA.title_audio || ""
  }].concat(scenes);
  var FADE_MS = 350;

  var els = {
    title:     document.getElementById("story-title"),
    img:       document.getElementById("scene-img"),
    imgWrap:   document.getElementById("image-wrap"),
    text:      document.getElementById("scene-text"),
    stage:     document.getElementById("stage"),
    end:       document.getElementById("end"),
    footer:    document.getElementById("footer"),
    dots:      document.getElementById("dots"),
    prev:      document.getElementById("prev-btn"),
    next:      document.getElementById("next-btn"),
    play:      document.getElementById("play-btn"),
    iconPlay:  document.getElementById("icon-play"),
    iconPause: document.getElementById("icon-pause"),
    replay:    document.getElementById("replay-btn"),
    autoadv:   document.getElementById("autoadvance"),
    audio:     document.getElementById("audio")
  };

  var idx = 0;
  var ended = false;

  els.title.textContent = DATA.title || "";

  // Build progress dots (slide 0 = cover, then one per scene)
  slides.forEach(function (s, i) {
    var b = document.createElement("button");
    b.className = "dot";
    b.setAttribute("aria-label", s.cover ? "Cover" : ("Scene " + i));
    b.addEventListener("click", function () { goTo(i); });
    els.dots.appendChild(b);
  });

  function render() {
    var s = slides[idx];
    els.img.src = s.image || "";
    els.img.alt = s.scene || "";
    els.text.textContent = s.text || "";
    // Cover = clean full illustration (no text/scrim/glyph)
    els.stage.classList.toggle("cover", !!s.cover);
    // Progress dots
    Array.prototype.forEach.call(els.dots.children, function (d, i) {
      d.className = "dot" + (i === idx ? " active" : (i < idx ? " done" : ""));
    });
    els.prev.disabled = (idx === 0);
    updatePlayIcon();
  }

  function audioSrcForCurrent() {
    return slides[idx].audio || "";
  }

  function loadAudio() {
    var src = audioSrcForCurrent();
    if (src) { els.audio.src = src; els.audio.load(); }
    else { els.audio.removeAttribute("src"); }
  }

  function updatePlayIcon() {
    var playing = !els.audio.paused && !els.audio.ended && els.audio.src;
    els.iconPlay.classList.toggle("hidden", playing);
    els.iconPause.classList.toggle("hidden", !playing);
  }

  function play() {
    if (!els.audio.src) loadAudio();
    if (!els.audio.src) {
      // Cover with no spoken title → just begin the story.
      if (slides[idx].cover) next();
      return;
    }
    var p = els.audio.play();
    if (p && p.catch) p.catch(function () {});
  }
  function pause() { els.audio.pause(); }
  function togglePlay() { (els.audio.paused) ? play() : pause(); }

  function show(newIdx, autoplay) {
    if (newIdx < 0 || newIdx >= slides.length) return;
    pause();
    els.stage.classList.add("fading");
    els.imgWrap.classList.add("fading");
    setTimeout(function () {
      idx = newIdx;
      render();
      loadAudio();
      els.stage.classList.remove("fading");
      els.imgWrap.classList.remove("fading");
      if (autoplay) play();
    }, FADE_MS);
  }

  function next() {
    if (idx < slides.length - 1) show(idx + 1, !els.audio.paused || els.autoadv.checked);
    else finish();
  }
  function prev() { if (idx > 0) show(idx - 1, !els.audio.paused); }
  function goTo(i) {
    if (ended) { ended = false; els.end.classList.remove("show"); els.stage.style.display = ""; els.footer.style.display = ""; }
    show(i, false);
  }

  function finish() {
    pause();
    ended = true;
    els.stage.style.display = "none";
    els.footer.style.display = "none";
    els.end.classList.add("show");
  }

  function replay() {
    ended = false;
    els.end.classList.remove("show");
    els.stage.style.display = "";
    els.footer.style.display = "";
    show(0, true);
  }

  // ----- Audio events -----
  els.audio.addEventListener("play", updatePlayIcon);
  els.audio.addEventListener("pause", updatePlayIcon);
  els.audio.addEventListener("ended", function () {
    updatePlayIcon();
    if (els.autoadv.checked) {
      setTimeout(function () { if (els.autoadv.checked && !ended) next(); }, 800);
    }
  });

  // ----- Controls -----
  els.play.addEventListener("click", togglePlay);
  els.next.addEventListener("click", next);
  els.prev.addEventListener("click", prev);
  els.replay.addEventListener("click", replay);
  els.imgWrap.addEventListener("click", function () {
    if (Date.now() < blockClickUntil) return;
    togglePlay();
  });

  // ----- Keyboard -----
  document.addEventListener("keydown", function (e) {
    if (e.key === "ArrowRight") next();
    else if (e.key === "ArrowLeft") prev();
    else if (e.key === " ") { e.preventDefault(); togglePlay(); }
  });

  // ----- Swipe (touch). LTR: swipe left = next, swipe right = prev. -----
  var startX = null, startY = null, blockClickUntil = 0;
  els.stage.addEventListener("touchstart", function (e) {
    if (!e.touches.length) return;
    startX = e.touches[0].clientX; startY = e.touches[0].clientY;
  }, { passive: true });
  els.stage.addEventListener("touchend", function (e) {
    if (startX === null) return;
    var t = e.changedTouches[0];
    var dx = t.clientX - startX, dy = t.clientY - startY;
    startX = startY = null;
    if (Math.abs(dx) < 50 || Math.abs(dx) < Math.abs(dy) * 2) return;
    blockClickUntil = Date.now() + 400;  // swallow the trailing click
    if (dx < 0) next(); else prev();
  }, { passive: true });

  // ----- Init -----
  render();
  loadAudio();
})();
</script>
</body>
</html>
